# Android CI — assemble debug APK + run JVM unit tests (pure-Kotlin engine included).
# NOTE: written before first publish; expect a shakedown run on the first push.
name: Android

on:
  push:
    branches: [main]
    paths: ['android-app/**', '.github/workflows/android.yml']
  pull_request:
    paths: ['android-app/**', '.github/workflows/android.yml']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v6

      - name: Assemble debug APK
        working-directory: android-app
        run: ./gradlew assembleDebug

      # `test` (not `testDebugUnitTest`): the pure-Kotlin modules (blocking-engine,
      # core-model) are kotlin.jvm projects whose test task is `test` — the old task name
      # silently skipped them, making the engine-test gate a false one (review P0-1).
      - name: Unit tests
        working-directory: android-app
        run: ./gradlew test

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: android-test-reports
          path: android-app/**/build/reports/tests/
